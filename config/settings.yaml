behavior:
  application_delay_seconds: 30
  auto_apply_above_score: 100
  review_mode: true
  headless: false
filters:
  excluded_industries: []
  keywords:
  - Engineer
  location_preferences: []
  remote_only: false
  roles:
  - Full Stack
  - Backend
  - ML
matching:
  max_jobs_per_run: 30
  min_match_score: 70
paths:
  applied_log: data/applied_jobs.json
  resume: resume/resume.pdf
